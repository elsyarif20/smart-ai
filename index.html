<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahim AI - Smart Polyglot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .chat-scroll::-webkit-scrollbar { width: 5px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <div class="max-w-2xl mx-auto h-screen flex flex-col bg-white shadow-2xl">
        <header class="p-5 border-b flex justify-between items-center bg-white sticky top-0 z-10">
            <div>
                <h1 class="text-2xl font-extrabold text-blue-600 tracking-tighter">AHIM AI</h1>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Brain + Multilingual</p>
            </div>
            <div class="flex gap-3">
                <button onclick="toggleMute()" id="muteBtn" class="p-2 rounded-full bg-slate-100 text-slate-500 hover:bg-blue-50 hover:text-blue-600 transition-all">
                    <i data-lucide="volume-2"></i>
                </button>
                <button onclick="clearChat()" class="p-2 rounded-full bg-slate-100 text-slate-500 hover:bg-red-50 hover:text-red-500 transition-all">
                    <i data-lucide="trash-2"></i>
                </button>
            </div>
        </header>

        <div id="chatBox" class="flex-1 overflow-y-auto p-5 space-y-6 chat-scroll bg-[#fdfdfd]">
            </div>

        <div id="typing" class="hidden px-5 py-2 text-xs text-slate-400 italic flex items-center gap-2">
            <span class="flex gap-1">
                <span class="w-1.5 h-1.5 bg-blue-400 rounded-full animate-bounce"></span>
                <span class="w-1.5 h-1.5 bg-blue-400 rounded-full animate-bounce" style="animation-delay: 0.2s"></span>
            </span>
            Ahim sedang berpikir...
        </div>

        <footer class="p-4 border-t bg-white">
            <div class="flex items-center gap-2 bg-slate-100 p-2 rounded-2xl border border-slate-200 focus-within:border-blue-400 transition-all">
                <button id="micBtn" onclick="startSTT()" class="p-3 rounded-xl text-slate-400 hover:bg-white hover:text-blue-600 transition-all">
                    <i data-lucide="mic"></i>
                </button>
                <input type="text" id="userInput" placeholder="Tanya Ahim (Jawa, Sunda, Inggris...)" 
                    class="flex-1 bg-transparent border-none outline-none text-sm px-2"
                    onkeypress="if(event.key === 'Enter') sendMessage()">
                <button onclick="sendMessage()" class="bg-blue-600 text-white p-3 rounded-xl hover:bg-blue-700 shadow-lg shadow-blue-200 transition-all">
                    <i data-lucide="send"></i>
                </button>
            </div>
            <p class="text-[9px] text-center mt-3 text-slate-400 font-medium">Sistem Cerdas Ahim AI • Vercel Ready</p>
        </footer>
    </div>

    <script>
        // --- KONFIGURASI ---
        const API_KEY = "MASUKKAN_API_KEY_GEMINI_DI_SINI"; 
        let isMuted = false;
        let chatHistory = JSON.parse(localStorage.getItem('ahim_memory')) || [];

        // Inisialisasi Ikon
        lucide.createIcons();

        // Muat Memori saat Start
        window.onload = () => {
            renderChat();
            if(chatHistory.length === 0) {
                addMessage("ai", "Sugeng enjang, Pak Liyas! Saya Ahim AI. Ada yang bisa saya bantu hari ini? Saya paham berbagai bahasa daerah dan dunia.");
            }
        };

        // --- FUNGSI UTAMA ---
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            input.value = "";
            addMessage("user", text);

            const typing = document.getElementById('typing');
            typing.classList.remove('hidden');

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{ text: `Anda adalah Ahim AI, asisten pintar Pak Liyas. Anda ramah, pakar bahasa daerah (Jawa, Sunda, dll) dan dunia. Riwayat: ${JSON.stringify(chatHistory.slice(-5))}. User berkata: ${text}` }]
                        }]
                    })
                });

                const data = await response.json();
                const aiResponse = data.candidates[0].content.parts[0].text;
                
                typing.classList.add('hidden');
                addMessage("ai", aiResponse);
                if(!isMuted) speak(aiResponse);

            } catch (error) {
                typing.classList.add('hidden');
                addMessage("ai", "Maaf Pak, koneksi saya agak terganggu. Pastikan API Key sudah benar ya!");
            }
        }

        function addMessage(role, text) {
            chatHistory.push({ role, text });
            localStorage.setItem('ahim_memory', JSON.stringify(chatHistory));
            renderChat();
        }

        function renderChat() {
            const box = document.getElementById('chatBox');
            box.innerHTML = chatHistory.map(msg => `
                <div class="flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'} animate-in fade-in duration-300">
                    <div class="max-w-[85%] p-4 rounded-2xl ${msg.role === 'user' ? 'bg-blue-600 text-white rounded-br-none' : 'bg-white border text-slate-800 rounded-tl-none shadow-sm'}">
                        <p class="text-sm leading-relaxed">${msg.text}</p>
                    </div>
                </div>
            `).join('');
            box.scrollTop = box.scrollHeight;
        }

        // --- FITUR SUARA ---
        function speak(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'id-ID';
            window.speechSynthesis.speak(utterance);
        }

        function startSTT() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return alert("Browser tidak mendukung suara.");
            
            const recognition = new SpeechRecognition();
            recognition.lang = 'id-ID';
            const micBtn = document.getElementById('micBtn');
            
            recognition.onstart = () => micBtn.classList.add('text-red-500', 'animate-pulse');
            recognition.onend = () => micBtn.classList.remove('text-red-500', 'animate-pulse');
            recognition.onresult = (event) => {
                document.getElementById('userInput').value = event.results[0][0].transcript;
            };
            recognition.start();
        }

        function toggleMute() {
            isMuted = !isMuted;
            document.getElementById('muteBtn').innerHTML = isMuted ? '<i data-lucide="volume-x"></i>' : '<i data-lucide="volume-2"></i>';
            lucide.createIcons();
            if(isMuted) window.speechSynthesis.cancel();
        }

        function clearChat() {
            if(confirm("Hapus memori chat?")) {
                chatHistory = [];
                localStorage.removeItem('ahim_memory');
                renderChat();
            }
        }
    </script>
</body>
</html>
